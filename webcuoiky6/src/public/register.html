<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Quản lý Thư viện</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card">
            <h1><i class="fas fa-user-plus"></i> Đăng ký tài khoản</h1>
            <p>Tạo tài khoản mới để truy cập hệ thống thư viện</p>           
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Chọn tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" placeholder="Nhập họ và tên" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu (tối thiểu 6 ký tự)" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Đăng ký</button>
            </form>
            
            <p style="text-align: center; margin-top: 1rem;">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const fullName = document.getElementById('fullName').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password.length < 6) {
                showToast('Mật khẩu phải có ít nhất 6 ký tự', true);
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp', true);
                return;
            }
            
            try {
                const newUser = authService.register({ username, email, fullName, password });
                showToast('Đăng ký thành công! Vui lòng đăng nhập.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showToast(error.message, true);
            }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Trang đăng ký luôn hiển thị giao diện sáng để tránh lệch tương phản
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.remove('dark-mode');
        });
    </script>
</body>
</html>
